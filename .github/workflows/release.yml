# Build installers for Windows / macOS / Linux and attach them to a GitHub Release.
#
# STATUS: the macOS/Linux legs are UNTESTED (they need real GitHub-hosted runners,
# which can't be exercised from a Windows dev box). The Windows sidecar build
# (scripts/build_sidecar.py) and the Rust compile were verified locally; the first
# real run of this workflow will shake out the mac/linux legs. Review the first
# run's logs before relying on it.
#
# Trigger: push a tag like `v0.1.0`, or run manually (workflow_dispatch).

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # create the Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux system deps (WebKitGTK for Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps (for the sidecar build)
        run: python -m pip install --upgrade pip -r requirements.txt -r requirements-web.txt

      - name: Pre-download the offline NER model
        # build_sidecar.py bundles ~/pythainlp-data so NER works offline; importing
        # the thainer engine once fetches it into the runner's home dir.
        run: python -c "from pythainlp.tag import NER; NER(engine='thainer')"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Build + stage the sidecar (cross-platform, single source)
        run: python scripts/build_sidecar.py

      - name: Install desktop (Tauri CLI) deps
        working-directory: desktop
        run: npm install

      - name: Build the Tauri app and publish the Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "AI Guard ${{ github.ref_name }}"
          releaseBody: "AI Guard desktop — installers for Windows / macOS / Linux. See the commit history for changes."
          releaseDraft: true
          prerelease: false
