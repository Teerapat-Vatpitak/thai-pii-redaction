<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var p = localStorage.getItem("aiguard.theme") || "system";
          var dark = p === "dark" || (p === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="sidepanel.css" />
    <title>AI Guard</title>
  </head>
  <body>
    <header class="hd">
      <span class="brand">
        <svg class="brand__mark" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6l7-3z"/><path d="M9 12l2 2 4-4"/></svg>
        AI Guard
      </span>
      <span id="dot" class="dot"></span>
      <span id="conn" class="conn">กำลังตรวจสอบ...</span>
      <button id="themeBtn" class="icon-btn" type="button" aria-label="ธีม"></button>
    </header>

    <main>
      <p class="hint">
        แถบนี้ค้างอยู่ข้างเบราว์เซอร์ วางข้อความมาปกปิดได้ตลอด บนหน้า ChatGPT / Claude
        ใช้ปุ่ม Mask / Restore ในหน้าได้เลย
      </p>

      <div class="seg" id="mode-seg" role="tablist" aria-label="โหมดการปกปิด">
        <button class="seg__opt" data-mode="token" aria-selected="true">Token [ชื่อ_1]</button>
        <button class="seg__opt" data-mode="surrogate" aria-selected="false">Surrogate</button>
      </div>

      <label class="lbl" for="input">ข้อความของคุณ</label>
      <textarea id="input" rows="5" placeholder="วางข้อความที่มีข้อมูลส่วนบุคคล..."></textarea>
      <div class="row">
        <button id="maskBtn" class="btn btn--primary">ปกปิดข้อมูล</button>
        <button id="copyBtn" class="btn btn--secondary" hidden>คัดลอก</button>
        <span id="msg" class="msg"></span>
      </div>

      <div id="maskedWrap" hidden>
        <div id="masked" class="well"></div>
        <div id="count" class="meta"></div>
      </div>

      <label class="lbl" for="reply">คำตอบจาก AI (เพื่อคืนค่า)</label>
      <textarea id="reply" rows="5" placeholder="วางคำตอบจาก AI ที่ยังมีโทเคน..."></textarea>
      <div class="row">
        <button id="restoreBtn" class="btn btn--primary" disabled>คืนค่า</button>
      </div>

      <div id="out" class="well" hidden></div>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
