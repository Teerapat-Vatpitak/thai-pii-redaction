ShortDescription: Mask Thai personal data (PII) before sending it to an external AI, then restore the real values locally.
Description: >-
  AI Guard detects and redacts Thai personally identifiable information (PII) for PDPA compliance.
  Everything runs on your machine, so raw PII never leaves the device. It offers two modes: true PDF
  redaction (a permanent black box at the bounding-box level) and AI Guard mode, which pseudonymizes
  PII with tokens before sending text to an external AI and then re-identifies the values locally from
  an in-memory vault after the response returns.
